    <script>
    // 隱藏選單列，滾動一定距離後顯示
    function HideMenu() {
        window.addEventListener('scroll', function(e){
            var HeightY = window.pageYOffset || document.documentElement.scrollTop,
                scrollHeight = 500, // 滾動距離
                header = document.querySelector(".menu"),
                Button_Top = document.querySelector("#Button_Top");
            
            if (header) {
                if (HeightY > scrollHeight) {
                    classie.add(header,"HideMenu");
                    if (Button_Top) classie.add(Button_Top,"DisplayShow");
                } else {
                    if (classie.has(header,"HideMenu")) { classie.remove(header,"HideMenu"); }
                    if (Button_Top && classie.has(Button_Top,"DisplayShow")) { classie.remove(Button_Top,"DisplayShow"); }
                }
            }
        });
    }
    window.onload = function() {
        HideMenu();
    };
    </script>
